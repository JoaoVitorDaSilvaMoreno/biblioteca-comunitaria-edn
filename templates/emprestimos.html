<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Empréstimos</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

{% include 'logo.html' %}

<div class="container">

    <div class="card">

        <h2> Empréstimo de Livros</h2>

        <form method="POST">

            <input
                type="text"
                name="codigo"
                placeholder="Código do Livro"
                required>

            <input
                type="text"
                name="usuario"
                placeholder="Nome do Usuário"
                required>

            <button type="submit">
                Emprestar Livro
            </button>

        </form>

        <a href="/" class="voltar">
             Voltar ao Menu
        </a>

    </div>

</div>

{% include 'footer.html' %}

</body>

</html>
