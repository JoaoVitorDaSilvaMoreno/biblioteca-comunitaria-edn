<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Pesquisar Livro</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

{% include 'logo.html' %}

<div class="container">

    <div class="card">

        <h2> Pesquisar Livro</h2>

        <form method="POST">

            <input
                type="text"
                name="titulo"
                placeholder="Digite parte do título"
                required>

            <button type="submit">
                Pesquisar
            </button>

        </form>

    </div>

    <div class="card">

        <h2>Resultado</h2>

        {% for livro in resultado %}

            <p>
                {{ livro.titulo }} - {{ livro.autor }}
            </p>

        {% endfor %}

        {% if not resultado %}
            <p>Nenhum resultado encontrado.</p>
        {% endif %}

        <a href="/" class="voltar">
             Voltar ao Menu
        </a>

    </div>

</div>

{% include 'footer.html' %}

</body>

</html>
