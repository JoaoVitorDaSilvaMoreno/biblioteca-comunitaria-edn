<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Biblioteca Comunitária EDN</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    {% include 'logo.html' %}
    
    <div class="container">

        <div class="card">

            <h1> Biblioteca Comunitária EDN</h1>

            <h2>Login Administrativo</h2>

            <form method="POST">

                <input
                    type="text"
                    name="usuario"
                    placeholder="Usuário"
                    required>

                <input
                    type="password"
                    name="senha"
                    placeholder="Senha"
                    required>

                <button type="submit">
                    Entrar
                </button>

            </form>

        </div>

    </div>

    {% include 'footer.html' %}

</body>

</html>
